# K8s/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextjs-app
spec:
  replicas: 2 
  selector:
    matchLabels:
      app: nextjs
  template:
    metadata:
      labels:
        app: nextjs
    spec:
      containers:
        - name: nextjs
          image: sriganesh15/nextjs-app:${BUILD_NUMBER}
          ports:
          - containerPort: 3000
          env:
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: MONGODB_URI
          
            - name: CLERK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: CLERK_SECRET_KEY

